name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: rg-todo-app
  ACR_NAME: todoappcr
  CONTAINER_APP_NAME: todo-app
  IMAGE_NAME: todo-app

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    outputs:
      acr-login-server: ${{ steps.deploy.outputs.acrLoginServer }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run tests before deploy
        run: dotnet test --configuration Release --verbosity normal

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Infrastructure (Bicep)
        id: deploy
        run: |
          result=$(az deployment group create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --query 'properties.outputs' -o json)
          echo "acrLoginServer=$(echo $result | jq -r '.acrLoginServer.value')" >> "$GITHUB_OUTPUT"

  build-and-push:
    runs-on: ubuntu-latest
    needs: deploy-infra
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push container image
        run: |
          docker build -t ${{ needs.deploy-infra.outputs.acr-login-server }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker build -t ${{ needs.deploy-infra.outputs.acr-login-server }}/${{ env.IMAGE_NAME }}:latest .
          docker push ${{ needs.deploy-infra.outputs.acr-login-server }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ needs.deploy-infra.outputs.acr-login-server }}/${{ env.IMAGE_NAME }}:latest

  deploy-app:
    runs-on: ubuntu-latest
    needs: [deploy-infra, build-and-push]
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ needs.deploy-infra.outputs.acr-login-server }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
