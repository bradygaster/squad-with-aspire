name: CD - Deploy to Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'infra/**'
      - '.github/workflows/cd.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: todo-api

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    outputs:
      acr-login-server: ${{ steps.deploy.outputs.acrLoginServer }}
      container-app-name: ${{ steps.deploy.outputs.containerAppName }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run tests before deploy
        run: dotnet test --configuration Release --verbosity normal

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Infrastructure (Bicep)
        id: deploy
        run: |
          result=$(az deployment group create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --query 'properties.outputs' -o json)
          echo "acrLoginServer=$(echo $result | jq -r '.acrLoginServer.value')" >> "$GITHUB_OUTPUT"
          echo "containerAppName=$(echo $result | jq -r '.containerAppName.value')" >> "$GITHUB_OUTPUT"

  build-and-push:
    runs-on: ubuntu-latest
    needs: deploy-infra
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name $(echo "${{ needs.deploy-infra.outputs.acr-login-server }}" | cut -d'.' -f1)

      - name: Build and push container image
        run: |
          docker build -t ${{ needs.deploy-infra.outputs.acr-login-server }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                       -t ${{ needs.deploy-infra.outputs.acr-login-server }}/${{ env.IMAGE_NAME }}:latest \
                       -f src/TodoApi/Dockerfile .
          docker push ${{ needs.deploy-infra.outputs.acr-login-server }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ needs.deploy-infra.outputs.acr-login-server }}/${{ env.IMAGE_NAME }}:latest

  deploy-app:
    runs-on: ubuntu-latest
    needs: [deploy-infra, build-and-push]
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ needs.deploy-infra.outputs.container-app-name }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ needs.deploy-infra.outputs.acr-login-server }}/${{ env.IMAGE_NAME }}:${{ github.sha }}