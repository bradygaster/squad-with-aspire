name: CD — Deploy to Azure

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'squads/**', 'squad-messages.db']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '22'
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

jobs:
  ci-gate:
    name: Run CI checks
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: ci-gate
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Provision & Deploy with azd
        run: |
          azd auth login \
            --client-id "$AZURE_CLIENT_ID" \
            --federated-credential-provider "github" \
            --tenant-id "$AZURE_TENANT_ID"
          azd up --no-prompt
        env:
          AZURE_ENV_NAME: pawmart-${{ github.event.inputs.environment || 'production' }}
          AZD_INITIAL_ENVIRONMENT_CONFIG: ${{ vars.AZD_INITIAL_ENVIRONMENT_CONFIG }}

      - name: Post-deploy health check
        run: |
          ENDPOINT=$(azd env get-value SERVICE_API_ENDPOINT_URL 2>/dev/null || echo "")
          if [ -n "$ENDPOINT" ]; then
            echo "Checking API health at $ENDPOINT/health..."
            curl -sf "$ENDPOINT/health" --max-time 30 || echo "⚠️ Health check unavailable"
          else
            echo "No endpoint URL found — skipping health check"
          fi
