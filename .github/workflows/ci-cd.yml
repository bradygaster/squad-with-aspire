name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '10.0.x'
  SOLUTION_FILE: SquadWithAspire.slnx

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_FILE }} --no-restore --configuration Release

      - name: Test
        run: dotnet test ${{ env.SOLUTION_FILE }} --no-build --configuration Release --verbosity normal

  docker-build-push:
    name: Build & Push Docker Images
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - app: todolist-api
            context: .
            dockerfile: src/TodoApi/Dockerfile
          - app: todolist-web
            context: .
            dockerfile: src/TodoWeb/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ matrix.app }}:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ matrix.app }}:latest

  deploy:
    name: Deploy to Azure Container Apps
    needs: docker-build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy infrastructure and apps
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: rg-todolist
          template: infra/main.bicep
          parameters: >
            infra/main.bicepparam
            apiImage=${{ secrets.ACR_LOGIN_SERVER }}/todolist-api:${{ github.sha }}
            webImage=${{ secrets.ACR_LOGIN_SERVER }}/todolist-web:${{ github.sha }}
          failOnStdErr: false
