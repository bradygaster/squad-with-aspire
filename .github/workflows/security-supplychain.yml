name: security-supplychain

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]
  schedule:
    # Weekly Monday 06:00 UTC re-scan for newly disclosed CVEs against main.
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write
  pull-requests: read

concurrency:
  group: security-supplychain-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql-csharp:
    name: codeql (csharp)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - uses: github/codeql-action/init@v3
        with:
          languages: csharp
          queries: security-extended,security-and-quality
      - name: Restore
        run: dotnet restore SquadWithAspire.slnx
        continue-on-error: true
      - name: Build (best-effort, no tests)
        run: dotnet build SquadWithAspire.slnx --no-restore --nologo -clp:NoSummary -v:quiet
        continue-on-error: true
      - uses: github/codeql-action/analyze@v3
        with:
          category: codeql-csharp

  dependency-review:
    name: dependency-review (PR only)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          # Allow common OSS licenses; flag copyleft/unknown for review.
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, MS-PL, MIT-0, 0BSD, Unlicense, CC0-1.0

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'true'
          GITLEAKS_ENABLE_SUMMARY: 'true'

  trivy-fs:
    name: trivy (fs + sbom)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan (vuln + misconfig + secret)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          scanners: 'vuln,misconfig,secret'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs
      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          format: 'cyclonedx'
          output: 'sbom.cdx.json'
      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 30
