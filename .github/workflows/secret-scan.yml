# SEC-1 — Secret scanning. Fails CI if a credential is detected.
# Owner: security-hardening-squad (Ripley).

name: secret-scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true

  appsettings-no-secrets:
    name: appsettings-no-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject secret-looking keys in appsettings*.json
        shell: bash
        run: |
          set -euo pipefail
          # SEC-1 acceptance: appsettings*.json must not contain any of these keys.
          BAD_KEYS='ConnectionString|ConnectionStrings|ApiKey|Api-Key|SecretKey|ClientSecret|AccessToken|StorageAccountKey|SharedAccessKey|Password'
          # Allow appsettings.Development.json to reference user-secrets *names* but
          # never carry an actual value past 8 chars.
          MATCHES=$(grep -RInE "\"(${BAD_KEYS})\"\\s*:\\s*\"[^\"]{8,}\"" \
                    $(git ls-files 'appsettings*.json' 'src/**/appsettings*.json') || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Forbidden secret-like keys in appsettings*.json:"
            echo "$MATCHES"
            exit 1
          fi
          echo "OK — no secret-like keys with non-empty values in appsettings*.json"
