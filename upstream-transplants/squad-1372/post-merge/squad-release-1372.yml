name: squad-release-1372

# Post-merge release automation for bradygaster/squad#1372.
# Drop at: .github/workflows/squad-release-1372.yml
#
# Trigger: fires automatically when the #1372 fix lands on main with the
# locked merge-contract subject. Falls back to manual dispatch.
#
# Owner: review-deployment-squad
# Gate:  required checks (squad-ci, squad-ci-windows) MUST be green before
#        the merge that triggers this workflow.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release bump (patch | minor)"
        required: true
        default: patch
        type: choice
        options: [patch, minor]
      dry_run:
        description: "Dry run (no tag, no publish, no issue close)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: read

concurrency:
  group: squad-release-1372
  cancel-in-progress: false

jobs:
  detect:
    name: Detect #1372 merge commit
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.match.outputs.should_release }}
      sha: ${{ steps.match.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: match
        name: Match locked merge subject
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SUBJECT="$(git log -1 --pretty=%s)"
          echo "Commit subject: $SUBJECT"
          EXPECTED='fix(cli): resolve copilot shim on Windows for loop preflight (#1372)'

          if [[ "$SUBJECT" == "$EXPECTED" ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "sha=" >> "$GITHUB_OUTPUT"
          fi

  verify-gate:
    name: Verify 11-item merge gate
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect.outputs.sha }}

      - name: Required files present
        shell: bash
        run: |
          set -euo pipefail
          REQUIRED=(
            "src/util/copilot-cli.ts"
            "src/util/copilot-cli-missing-message.ts"
            "docs/errors/copilot-cli-missing.md"
            "tests/util/copilot-cli.test.ts"
            ".github/workflows/squad-ci-windows.yml"
            "CHANGELOG.md"
          )
          missing=0
          for f in "${REQUIRED[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "::error file=$f::missing from merge — gate violation"
              missing=1
            fi
          done
          [[ $missing -eq 0 ]]

      - name: CHANGELOG references #1372
        shell: bash
        run: grep -E '#1372' CHANGELOG.md

      - name: Renderer wired into loop.ts
        shell: bash
        run: |
          grep -E "renderCopilotMissingMessage|copilot-cli-missing-message" src/loop.ts

      - name: Shared util has no caller-supplied args
        shell: bash
        run: |
          set -euo pipefail
          if grep -nE 'execFile\([^)]*,\s*\[[^\]]*\$\{?[A-Za-z_]' src/util/copilot-cli.ts; then
            echo "::error::caller-supplied args detected in shared util"
            exit 1
          fi

      - name: timeout:5000 preserved
        shell: bash
        run: grep -E 'timeout:\s*5000' src/util/copilot-cli.ts

  release:
    name: Cut patch release
    needs: [detect, verify-gate]
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect.outputs.sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm ci

      - name: Bump version
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          BUMP="${{ github.event.inputs.release_type || 'patch' }}"
          NEW=$(npm version "$BUMP" --no-git-tag-version)
          echo "version=${NEW#v}" >> "$GITHUB_OUTPUT"
          echo "tag=${NEW}" >> "$GITHUB_OUTPUT"

      - name: Commit + tag
        if: github.event.inputs.dry_run != 'true'
        shell: bash
        env:
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): ${TAG} — Windows shim fix for loop preflight (#1372)"
          git tag -a "${TAG}" -m "Release ${TAG}: Windows .cmd/.ps1 shim resolution for #1372"
          git push origin HEAD:main
          git push origin "${TAG}"

      - name: Publish to npm
        if: github.event.inputs.dry_run != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Create GitHub Release
        if: github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.bump.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${TAG}" \
            --title "${TAG} — Windows shim fix (#1372)" \
            --notes "Resolves [#1372](https://github.com/bradygaster/squad/issues/1372): \`squad loop --preflight\` now resolves the \`copilot\` CLI on Windows when installed as a \`.cmd\` or \`.ps1\` shim.

          **Windows users**: upgrade with \`npm i -g @bradygaster/squad@${TAG#v}\`.

          See [\`docs/errors/copilot-cli-missing.md\`](https://github.com/bradygaster/squad/blob/main/docs/errors/copilot-cli-missing.md) for the new diagnostic.

          Full changelog: [CHANGELOG.md](https://github.com/bradygaster/squad/blob/main/CHANGELOG.md)."

      - name: Close #1372 with release link
        if: github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.bump.outputs.tag }}
        shell: bash
        run: |
          gh issue close 1372 \
            --reason completed \
            --comment "Fixed in [${TAG}](https://github.com/bradygaster/squad/releases/tag/${TAG}).

          Windows users: \`npm i -g @bradygaster/squad@${TAG#v}\`.

          Diagnostic for future failures: [\`docs/errors/copilot-cli-missing.md\`](https://github.com/bradygaster/squad/blob/main/docs/errors/copilot-cli-missing.md).

          A separate follow-up issue tracks the spawn-side \`shell:true\` argument-injection hardening (security pre-approved, medium severity, non-blocking)."

      - name: File spawn-side hardening follow-up
        if: github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.bump.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          gh issue create \
            --title "security: harden spawn-side shell:true against argument injection (follow-up to #1372)" \
            --label "security,follow-up" \
            --body "Follow-up to #1372 (closed in ${TAG}).

          The Windows shim fix uses \`execFile\` with \`shell: true\` on a hard-coded \`copilot --version\` invocation — no caller-supplied arguments reach the shell, so #1372's fix is safe.

          However, **other callsites** in the agent-spawn path may pass user-influenced arguments through \`shell: true\`. This issue tracks auditing every \`shell: true\` callsite and either:

          1. Removing \`shell: true\` where the executable can be resolved without a shim, or
          2. Adding an allowlist + shell-escape pass for any caller-supplied arg that crosses the shell boundary.

          **Severity**: medium. **Blocking**: no (does not block ${TAG}).
          **Test coverage already exists** at \`test/spawn-shell-injection.test.ts\` (regression guard from squad-with-aspire transplant bundle commit \`b9c6982\`).

          Owner: security-hardening-squad."
