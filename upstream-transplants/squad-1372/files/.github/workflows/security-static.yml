name: security-static

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  schedule:
    # Weekly drift check — catches new spawn sites added without ruleset awareness.
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  semgrep:
    name: semgrep (squad spawn rules)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: returntocorp/semgrep:1.85.0
    steps:
      - uses: actions/checkout@v4

      - name: Verify ruleset present
        run: |
          test -f .semgrep/squad-spawn-rules.yml \
            || { echo "::error::.semgrep/squad-spawn-rules.yml missing — security regression"; exit 1; }

      - name: Run squad-spawn-rules (fail on ERROR severity)
        run: |
          semgrep \
            --config .semgrep/squad-spawn-rules.yml \
            --error \
            --severity ERROR \
            --metrics off \
            --timeout 60 \
            --max-target-bytes 2000000 \
            --sarif --output semgrep.sarif \
            packages/

      - name: Run squad-spawn-rules (report WARN as annotations)
        if: always()
        run: |
          semgrep \
            --config .semgrep/squad-spawn-rules.yml \
            --severity WARNING \
            --metrics off \
            --timeout 60 \
            --json --output semgrep-warn.json \
            packages/ || true
          python3 -c "
          import json, sys
          try:
            data = json.load(open('semgrep-warn.json'))
          except Exception:
            sys.exit(0)
          for r in data.get('results', []):
            path = r.get('path', '?')
            line = r.get('start', {}).get('line', 0)
            rule = r.get('check_id', '?').split('.')[-1]
            msg = r.get('extra', {}).get('message', '').splitlines()[0]
            print(f'::warning file={path},line={line},title=semgrep/{rule}::{msg}')
          "

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: squad-spawn-rules

  spawn-audit:
    name: bare-spawn audit (defense in depth)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Fail on unguarded execFile/spawn of 'copilot'
        shell: bash
        run: |
          set -euo pipefail
          # Allowlist: the shared util is the ONLY site permitted to resolve 'copilot' directly.
          ALLOWLIST='packages/squad-cli/src/cli/util/copilot-cli.ts'
          # Grep for execFile/spawn/exec calls where the first arg is the bare string 'copilot'
          # or "'copilot'" without going through resolveCopilotCmd().
          hits=$(grep -RnE "(execFile|spawn|exec)\s*\(\s*['\"]copilot['\"]" \
            --include='*.ts' --include='*.js' \
            packages/ \
            | grep -v "^${ALLOWLIST}:" || true)
          if [ -n "$hits" ]; then
            echo "::error::Bare 'copilot' spawn detected — must route through resolveCopilotCmd()"
            echo "$hits" | while IFS=: read -r f l _; do
              echo "::error file=$f,line=$l::Use resolveCopilotCmd() from util/copilot-cli.ts"
            done
            exit 1
          fi
          echo "OK: all copilot spawn sites route through resolveCopilotCmd()."

      - name: Fail on shell:true with tainted args
        shell: bash
        run: |
          set -euo pipefail
          # Any execFile/spawn with { shell: true } in packages/ is a smell. Allow only
          # in tests and in agent-spawn.ts ONLY if accompanied by a sibling
          # `// SECURITY: args are static` comment within 3 lines.
          hits=$(grep -RnE "shell\s*:\s*true" \
            --include='*.ts' --include='*.js' \
            packages/squad-cli/src/ \
            || true)
          if [ -n "$hits" ]; then
            echo "::error::shell:true detected in squad-cli source — drop it or justify inline."
            echo "$hits"
            exit 1
          fi
          echo "OK: no shell:true in squad-cli source."
