name: dark-mode-gate

# Merge gate for the dark-mode toggle epic (DM-001..DM-007).
# Owner: review-deployment-squad (release captain for v0.5.0).
# Becomes a required check on PRs labeled `epic:dark-mode` or touching
# the dark-mode token / provider / no-FOUC / test files.

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/src/styles/tokens/**'
      - 'apps/web/src/styles/dark-mode.css'
      - 'apps/web/src/components/ThemeProvider/**'
      - 'apps/web/src/components/ThemeToggle/**'
      - 'apps/web/src/app/layout.tsx'
      - 'apps/web/src/app/no-foul-script.ts'
      - 'apps/web/src/lib/theme/**'
      - 'apps/web/src/**/*.test.ts'
      - 'apps/web/src/**/*.test.tsx'
      - 'docs/dark-mode/**'
      - '.github/workflows/dark-mode-gate.yml'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: dark-mode-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract-invariants:
    name: contract invariants
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: three-state union locked (light | dark | system)
        run: |
          set -e
          # Theme type must include exactly the three documented states.
          F=apps/web/src/lib/theme/types.ts
          if [ ! -f "$F" ]; then
            echo "::error file=$F::theme types file missing — DM-002 contract violated"
            exit 1
          fi
          grep -Eq "'light'[[:space:]]*\|[[:space:]]*'dark'[[:space:]]*\|[[:space:]]*'system'" "$F" \
            || { echo "::error file=$F::Theme union must be 'light' | 'dark' | 'system'"; exit 1; }

      - name: persistence key is stable
        run: |
          set -e
          # Storage key change is a breaking change for end users — block it.
          grep -RhoE "ta:theme:v[0-9]+" apps/web/src/lib/theme/ | sort -u > /tmp/keys
          if [ "$(wc -l < /tmp/keys)" -ne 1 ]; then
            echo "::error::Exactly one ta:theme:vN key allowed across lib/theme/"
            cat /tmp/keys
            exit 1
          fi

      - name: no-FOUC inline script has integrity hash referenced from CSP
        run: |
          set -e
          # If DM-003 ships an inline script, its sha256 must be present in DM-005 CSP.
          SCRIPT=apps/web/src/app/no-foul-script.ts
          CSP_DOC=docs/dark-mode/csp.md
          if [ -f "$SCRIPT" ]; then
            test -f "$CSP_DOC" || { echo "::error::no-FOUC script present but docs/dark-mode/csp.md missing (DM-005 sign-off required)"; exit 1; }
            grep -q "sha256-" "$CSP_DOC" || { echo "::error file=$CSP_DOC::CSP doc must declare a sha256- hash for the inline script"; exit 1; }
          fi

      - name: a11y contract — toggle has accessible name + aria-pressed states documented
        run: |
          set -e
          TOGGLE=apps/web/src/components/ThemeToggle
          if [ -d "$TOGGLE" ]; then
            grep -RhE 'aria-(label|labelledby|pressed)' "$TOGGLE" >/dev/null \
              || { echo "::error::ThemeToggle must expose aria-label/labelledby + aria-pressed"; exit 1; }
          fi

      - name: no hard-coded color hex outside tokens
        run: |
          set -e
          # DM-001 tokens own colors. App code must reference CSS vars, not raw hex.
          OFFENDERS=$(grep -RnE '#[0-9a-fA-F]{3,8}\b' \
            apps/web/src/components apps/web/src/app \
            --include='*.tsx' --include='*.ts' --include='*.css' \
            2>/dev/null | grep -vE '(/tokens/|/dark-mode\.css$|// dark-mode:ok)' || true)
          if [ -n "$OFFENDERS" ]; then
            echo "::error::Hard-coded color literals outside tokens — use CSS vars or annotate with // dark-mode:ok"
            echo "$OFFENDERS"
            exit 1
          fi

  build-and-test:
    name: build & test (DM-004)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: install
        run: pnpm install --frozen-lockfile

      - name: lint
        run: pnpm lint

      - name: typecheck
        run: pnpm exec tsc --noEmit

      - name: unit + a11y tests
        run: pnpm test --reporter=default

      - name: build
        run: pnpm build

  csp-and-threat-model:
    name: CSP + threat model (DM-005)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - name: DM-005 sign-off doc present
        run: |
          set -e
          test -f docs/dark-mode/threat-model.md || { echo "::error::docs/dark-mode/threat-model.md required (DM-005 sign-off)"; exit 1; }
          test -f docs/dark-mode/csp.md          || { echo "::error::docs/dark-mode/csp.md required (DM-005 sign-off)"; exit 1; }
          grep -q "DM-005: APPROVED" docs/dark-mode/threat-model.md \
            || { echo "::error file=docs/dark-mode/threat-model.md::missing 'DM-005: APPROVED' marker"; exit 1; }

  gate:
    name: gate
    needs: [contract-invariants, build-and-test, csp-and-threat-model]
    runs-on: ubuntu-latest
    steps:
      - run: echo "✅ dark-mode merge gate green"
