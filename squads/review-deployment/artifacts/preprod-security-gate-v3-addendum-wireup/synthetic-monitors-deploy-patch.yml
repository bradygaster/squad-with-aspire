# synthetic-monitors-deploy.yml — patch additions for GATE-CO-06c-namespace + GATE-CO-06f
#
# Append these two jobs to the canary monitor deploy workflow (the one that runs
# `az deployment group create` on infra/bicep/synthetic-monitors/main.bicep).
# Both jobs MUST appear in `needs:` of the deploy job.

  gate-co-06c-namespace-pre-deploy:
    name: GATE-CO-06c-namespace (RBAC scope + cardinality cap)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Run RBAC + cardinality check
        env:
          BICEP_DIR: infra/bicep/synthetic-monitors
          CANARY_RG: ${{ vars.CANARY_RG }}
          SHARED_RG: ${{ vars.SHARED_RG }}
          AI_RESOURCE_NAME: ${{ vars.AI_CANARY_RESOURCE_NAME }}
          METRIC_NAMESPACE: checkout.canary_terminal_response_timing
          COST_CAP_USD: "200"
        run: |
          chmod +x scripts/ci/pre-deploy-rbac-cardinality-check.sh
          ./scripts/ci/pre-deploy-rbac-cardinality-check.sh

  gate-co-06f-pan-storage:
    name: GATE-CO-06f (test PANs canary-KV-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: PAN literals confined to synthetic-monitors dir
        run: |
          # Stripe test PANs: 4000..0002, 4000..0119, etc. Adyen: 4111..1111, etc.
          # Any 13-19 digit sequence that looks like a card number, scanned across full tree.
          # Allowed: infra/bicep/synthetic-monitors/, tests/canary/, .github/workflows/canary-runner-image-build.yml comments.
          PAN_PATTERN='\b(4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14}|3[47][0-9]{13}|6(?:011|5[0-9]{2})[0-9]{12})\b'

          # Allow-list paths (PCRE alternation).
          ALLOW='^(infra/bicep/synthetic-monitors/|tests/canary/|\.github/workflows/canary-runner-image-build\.yml|squads/.*/artifacts/.*-bundle/|docs/security/preprod-security-gate.*\.md)'

          HITS=$(grep -rEn "$PAN_PATTERN" . \
            --include='*.bicep' --include='*.bicepparam' \
            --include='*.cs' --include='*.ts' --include='*.tsx' --include='*.js' --include='*.json' --include='*.yml' --include='*.yaml' --include='*.md' --include='*.sh' \
            --exclude-dir='.git' --exclude-dir='node_modules' --exclude-dir='bin' --exclude-dir='obj' --exclude-dir='dist' \
            2>/dev/null | grep -vE "$ALLOW" || true)

          if [ -n "$HITS" ]; then
            echo "::error::GATE-CO-06f: test PAN literal found outside synthetic-monitors / tests/canary / allow-listed paths"
            echo "$HITS"
            exit 1
          fi
          echo "PASS: no PAN literals outside canary scope"

      - name: bicepparam references canary KV only
        run: |
          # Both bicepparam files MUST reference *-canary KV names, NOT app prod KV.
          for f in infra/bicep/synthetic-monitors/main.canary.bicepparam infra/bicep/synthetic-monitors/main.prod.bicepparam; do
            if [ ! -f "$f" ]; then
              echo "::error::missing $f"
              exit 1
            fi
            # Must contain travel-assistant-kv-canary (or -canary-prod for prod slot canary monitor)
            if ! grep -qE 'travel-assistant-kv-canary' "$f"; then
              echo "::error::$f does not reference canary KV"
              exit 1
            fi
            # Must NOT reference bare app prod KV name
            if grep -qE 'travel-assistant-kv[^-]' "$f"; then
              echo "::error::$f references non-canary KV — GATE-CO-06f violation"
              exit 1
            fi
          done
          echo "PASS: bicepparam KV refs are canary-scoped"
