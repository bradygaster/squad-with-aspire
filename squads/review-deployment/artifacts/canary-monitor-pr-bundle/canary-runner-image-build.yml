# .github/workflows/canary-runner-image.yml
# Build + push the canary-runner image to ACR. MUST run + complete before bicep deploy,
# because checkout-terminal-canary.bicep ContainerApp will fail to start if image is absent.
#
# Image: travelassistantacr.azurecr.io/canary-runner:v1.0.0
# Source: apps/canary-runner/ (to be authored — see README §"Runner contract" in this bundle)
#
# Triggers:
#  - push on apps/canary-runner/** to main
#  - workflow_dispatch with version override

name: canary-runner image build

on:
  push:
    branches: [main]
    paths:
      - 'apps/canary-runner/**'
      - '.github/workflows/canary-runner-image.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag (semver, no v prefix needed)'
        required: true
        default: '1.0.0'

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: travelassistantacr
  IMAGE: canary-runner

jobs:
  build-push:
    runs-on: ubuntu-latest
    environment: canary-runner-build
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version tag
        id: ver
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Az login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name $ACR_NAME

      - name: Pre-build CHECKOUT_DEBUG scan (defense-in-depth)
        shell: bash
        run: |
          set -euo pipefail
          if grep -rnE 'CHECKOUT_DEBUG' apps/canary-runner/ 2>/dev/null; then
            echo "::error::CHECKOUT_DEBUG must NEVER appear in canary-runner source"
            exit 1
          fi

      - name: Build + push image
        run: |
          set -euo pipefail
          TAG="${{ steps.ver.outputs.tag }}"
          IMG="$ACR_NAME.azurecr.io/$IMAGE:$TAG"
          docker build -t "$IMG" apps/canary-runner/
          docker push "$IMG"
          # Also push :latest pointer for canary slot convenience (prod pins to immutable tag).
          docker tag "$IMG" "$ACR_NAME.azurecr.io/$IMAGE:latest"
          docker push "$ACR_NAME.azurecr.io/$IMAGE:latest"
          echo "Pushed $IMG"

      - name: Trivy scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE }}:${{ steps.ver.outputs.tag }}
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          ignore-unfixed: true
